<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التحقق من البطاقة — الاتحاد العام لنقابات العمال</title>
<style>
  :root {
    --primary:    #428177;
    --dark:       #054239;
    --deep:       #002623;
    --gold:       #b9a779;
    --light-bg:   #edebe0;
    --white:      #ffffff;
    --gray:       #5a6a64;
    --black:      #161616;
    --ok:         #1a7a50;
    --ok-bg:      #e8f5ef;
    --ok-border:  #a3d4bc;
    --err:        #7a1a1a;
    --err-bg:     #fdf0f0;
    --err-border: #e8aaaa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    background: linear-gradient(160deg, var(--deep) 0%, var(--dark) 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── رأس الصفحة ── */
  .page-header {
    width: 100%;
    max-width: 900px;
    margin: 24px auto 0;
    padding: 0 16px;
  }

  .page-header img {
    width: 100%;
    border-radius: 14px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    display: block;
  }

  /* ── بطاقة النتيجة ── */
  .card {
    background: var(--white);
    width: 90%;
    max-width: 520px;
    margin: 28px auto 0;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    animation: rise 0.55s cubic-bezier(.22,.8,.36,1) both;
  }

  @keyframes rise {
    from { opacity:0; transform:translateY(28px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .card-header {
    background: linear-gradient(135deg, var(--deep), var(--dark));
    padding: 22px 24px 18px;
    text-align: center;
    border-bottom: 3px solid var(--gold);
  }

  .card-header h2 {
    color: var(--gold);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: .5px;
  }

  .card-header p {
    color: rgba(255,255,255,.55);
    font-size: 12px;
    margin-top: 4px;
  }

  .card-body {
    padding: 28px 24px 24px;
    text-align: center;
  }

  /* ── حالة التحميل ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    color: var(--gray);
    font-size: 15px;
    padding: 20px 0;
  }

  .spinner {
    width: 38px; height: 38px;
    border: 4px solid #e0e0e0;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── نتيجة ناجحة ── */
  .result-ok {
    background: var(--ok-bg);
    border: 1.5px solid var(--ok-border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 18px;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--ok);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 50px;
    margin-bottom: 16px;
  }

  .name-box {
    background: var(--white);
    border: 1.5px solid var(--ok-border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 12px;
  }

  .name-label {
    font-size: 11px;
    color: var(--gray);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .name-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--dark);
  }

  .sn-box {
    background: var(--light-bg);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 14px;
    color: var(--gray);
    font-family: monospace;
    letter-spacing: 1.5px;
  }

  .sn-label {
    font-size: 11px;
    color: var(--gray);
    margin-bottom: 3px;
    font-family: "Segoe UI", sans-serif;
    letter-spacing: 1px;
  }

  .msg-facilitate {
    font-size: 15px;
    color: var(--dark);
    margin: 18px 0 6px;
    font-weight: 600;
    line-height: 1.6;
  }

  .org-name {
    font-size: 13px;
    color: var(--gray);
    border-top: 1px solid #e8e8e8;
    padding-top: 14px;
    margin-top: 14px;
  }

  /* ── نتيجة خاطئة ── */
  .result-err {
    background: var(--err-bg);
    border: 1.5px solid var(--err-border);
    border-radius: 14px;
    padding: 24px 20px;
  }

  .err-icon {
    font-size: 40px;
    margin-bottom: 12px;
  }

  .err-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--err);
    margin-bottom: 8px;
  }

  .err-sub {
    font-size: 13px;
    color: var(--gray);
  }

  /* ── زر الخدمات ── */
  .services-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: linear-gradient(135deg, var(--dark), var(--primary));
    color: var(--white);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity .2s, transform .15s;
    letter-spacing: .3px;
  }

  .services-btn:hover {
    opacity: .88;
    transform: translateY(-1px);
  }

  .services-btn span {
    margin-left: 8px;
    font-size: 18px;
  }

  /* ── تذييل ── */
  .page-footer {
    color: rgba(255,255,255,.3);
    font-size: 11px;
    text-align: center;
    margin: 20px 0 28px;
  }
</style>
</head>
<body>

<!-- رأس الصفحة -->
<div class="page-header">
  <img src="header.png" alt="الاتحاد العام لنقابات العمال">
</div>

<!-- بطاقة النتيجة -->
<div class="card">
  <div class="card-header">
    <h2>نتيجة التحقق من البطاقة</h2>
    <p>الاتحاد العام لنقابات العمال — الجمهورية العربية السورية</p>
  </div>
  <div class="card-body">
    <div id="result">
      <div class="loading">
        <div class="spinner"></div>
        <span>جارٍ التحقق من البطاقة…</span>
      </div>
    </div>

    <!-- زر صفحة الخدمات — يظهر دائماً -->
    <a href="#" class="services-btn" id="services-link">
      <span>🔗</span> اضغط للانتقال لصفحة الخدمات
    </a>
  </div>
</div>

<div class="page-footer">© الاتحاد العام لنقابات العمال — جميع الحقوق محفوظة</div>

<script>
// ── رابط الـ API ──
const API = "https://script.google.com/macros/s/AKfycbzcReQYhbDvoG6pXy55UNfFXz1Nz5-Gvv069rtJkGZBmnscmjSMP1vguJj8dMGw77Q/exec";

// ── رابط صفحة الخدمات (عدّله لاحقاً) ──
const SERVICES_URL = "#services";   // ← ضع الرابط هنا عندما تبرمج الصفحة
document.getElementById("services-link").href = SERVICES_URL;

const params = new URLSearchParams(window.location.search);
const sn     = params.get("sn");
const result = document.getElementById("result");

if (!sn) {
  showError("رقم البطاقة غير موجود", "تأكد من مسح رمز QR بشكل صحيح");
} else {
  // ── JSONP لتجاوز CORS في Google Apps Script ──
  const cbName = "cb_" + Date.now();
  const script = document.createElement("script");
  const timer  = setTimeout(() => {
    cleanup();
    showError("انتهت مهلة الاتصال", "تحقق من اتصالك بالإنترنت وحاول مجدداً");
  }, 10000);

  function cleanup() {
    clearTimeout(timer);
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }

  window[cbName] = function(data) {
    cleanup();
    if (data.ok && data.active) {
      showSuccess(data.sn, data.name, data.status);
    } else if (data.ok && !data.active) {
      showInactive(data.sn, data.name);
    } else {
      showError("البطاقة غير موجودة في النظام", data.message || "");
    }
  };

  script.onerror = function() {
    cleanup();
    showError("خطأ في الاتصال بالخادم", "تحقق من اتصالك بالإنترنت وحاول مجدداً");
  };

  script.src = API + "?sn=" + encodeURIComponent(sn) + "&callback=" + cbName;
  document.head.appendChild(script);
}

function showSuccess(sn, name, status) {
  result.innerHTML = `
    <div class="result-ok">
      <div class="status-badge">✅ ${status || "فعالة"}</div>

      <div class="name-box">
        <div class="name-label">اسم حامل البطاقة</div>
        <div class="name-value">${name || "—"}</div>
      </div>

      <div class="sn-box">
        <div class="sn-label">الرقم التسلسلي</div>
        <div>${sn}</div>
      </div>

      <div class="msg-facilitate">
        يُرجى تسهيل عمل حامل هذه البطاقة
      </div>

      <div class="org-name">الاتحاد العام لنقابات العمال</div>
    </div>
  `;
}

function showInactive(sn, name) {
  result.innerHTML = `
    <div class="result-err">
      <div class="err-icon">⚠️</div>
      <div class="err-title">البطاقة غير فعالة</div>
      ${name ? `<div class="err-sub" style="margin:8px 0;font-size:15px;font-weight:600;color:#333">${name}</div>` : ""}
      <div class="sn-box" style="margin-top:12px">
        <div class="sn-label">الرقم التسلسلي</div>
        <div>${sn}</div>
      </div>
      <div class="err-sub" style="margin-top:12px">هذه البطاقة موجودة في النظام لكنها غير مفعّلة</div>
    </div>
  `;
}

function showError(title, sub) {
  result.innerHTML = `
    <div class="result-err">
      <div class="err-icon">❌</div>
      <div class="err-title">${title}</div>
      ${sub ? `<div class="err-sub" style="margin-top:6px">${sub}</div>` : ""}
    </div>
  `;
}
</script>
</body>
</html>
